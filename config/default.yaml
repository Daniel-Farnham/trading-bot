# Trading Bot Configuration — V3 Thesis-Driven

alpaca:
  base_url: "https://paper-api.alpaca.markets"
  data_url: "https://data.alpaca.markets"

# Curated stock universe — themed candidates Claude can pick from
universe:
  ai_technology:
    - NVDA    # GPU/AI infrastructure leader
    - AVGO    # Networking chips, custom AI silicon
    - AMD     # GPU competitor, data center growth
    - MSFT    # Azure AI, OpenAI partnership
    - GOOGL   # AI research, cloud, search
    - AMZN    # AWS, logistics automation
    - META    # AI research, social media
    - CRM     # Enterprise AI/SaaS
    - PLTR    # AI/government analytics
    - CRWD    # Cybersecurity (AI-adjacent)
    - SMCI    # AI server infrastructure
    - ARM     # Chip design, AI edge computing
    - TSM     # Foundry — makes everyone's chips
    - MU      # Memory chips for AI workloads
    - SNOW    # Cloud data platform

  healthcare_aging:
    - LLY     # GLP-1 leader (Mounjaro/Zepbound)
    - NVO     # GLP-1 competitor (Ozempic/Wegovy)
    - UNH     # Health insurance + Optum
    - JNJ     # Pharma + medical devices
    - ABBV    # Immunology, oncology
    - ISRG    # Surgical robotics
    - DXCM    # Continuous glucose monitoring
    - TMO     # Life sciences tools
    - VRTX    # Gene therapy, rare diseases
    - REGN    # Biotech, immunology

  energy_climate:
    - XOM     # Oil major, energy transition
    - CVX     # Oil major, hydrogen/CCS
    - ENPH    # Solar microinverters
    - FSLR    # Solar panels (US manufacturing)
    - NEE     # Largest US renewable utility
    - VST     # Nuclear + renewable power
    - CEG     # Nuclear power (AI data centers)
    - LNG     # LNG exports, energy security
    - OXY     # Oil + carbon capture

  finance:
    - JPM     # Largest US bank
    - GS      # Investment banking, trading
    - V       # Payment networks
    - MA      # Payment networks
    - BLK     # Asset management
    - SQ      # Fintech, Cash App
    - COIN    # Crypto exchange
    - SOFI    # Digital banking
    - SCHW    # Brokerage, wealth management

  consumer_inequality:
    - COST    # Membership warehouse, defensive
    - WMT     # Discount retail, ecommerce
    - TGT     # Value retail
    - DG      # Dollar stores, low-income consumer
    - NKE     # Consumer brands, global
    - SBUX    # Consumer discretionary
    - CMG     # Fast casual dining
    - HD      # Home improvement, housing cycle

  discovery_pool:
    - T       # AT&T — telecom
    - VZ      # Verizon — telecom
    - KSS     # Kohl's — department stores
    - WBA     # Walgreens — pharmacy retail
    - CAT     # Caterpillar — industrials
    - BA      # Boeing — aerospace
    - FCX     # Freeport-McMoRan — copper mining
    - NUE     # Nucor — steel
    - DIS     # Disney — media/entertainment
    - NFLX    # Netflix — streaming
    - PARA    # Paramount — legacy media
    - CMCSA   # Comcast — cable/media
    - AMT     # American Tower — cell tower REIT
    - PLD     # Prologis — industrial REIT
    - SO      # Southern Company — utility
    - PG      # Procter & Gamble — consumer staples
    - F       # Ford — auto
    - CVS     # CVS Health — pharmacy/insurance
    - MCD     # McDonald's — fast food
    - DE      # Deere — agriculture/industrials

trading:
  max_position_pct: 1.0
  max_open_positions: 8
  max_daily_loss_pct: 0.03
  max_drawdown_pct: 0.30
  min_cash_reserve_pct: 0.20
  enable_short_selling: true
  max_short_exposure_pct: 0.30
  max_short_position_pct: 0.15
  # Core positions (high/highest) use 30% catastrophic safety net only
  catastrophic_stop_pct: 0.30

scheduler:
  loop_interval_minutes: 30
  market_open: "09:30"
  market_close: "16:00"
  daily_review_time: "16:30"

database:
  path: "data/trading.db"

fundamentals:
  cache_dir: "data/fundamentals_cache"
  # Profitability gate: unprofitable companies capped at "high" confidence (10%)
  profitability_gate: true

memory:
  theses_path: "data/active_theses.md"
  ledger_path: "data/portfolio_ledger.md"
  summaries_path: "data/quarterly_summaries.md"
  lessons_path: "data/lessons_learned.md"
  themes_path: "data/themes.md"
  max_active_theses: 15
  max_watching_theses: 5
  watching_expiry_reviews: 6
  max_quarterly_summaries: 8
  max_themes: 8
  beliefs_path: "data/beliefs.md"
  max_lessons: 15
  max_beliefs: 5
